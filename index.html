<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Food Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-bottom: 4px solid #764ba2;
        }

        .tab-btn:hover {
            background: #f5f5f5;
        }

        .tab-btn.active:hover {
            background: #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="datetime-local"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .secondary-btn:hover {
            background: #e0e0e0;
        }

        .food-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .food-item:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .food-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .food-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .meta-item {
            color: #666;
        }

        .meta-item.timestamp {
            color: #667eea;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-allergen {
            background: #ffe0e0;
            color: #c00;
        }

        .badge-favorite {
            background: #fffacd;
            color: #ff8c00;
        }

        .badge-fed {
            background: #e0ffe0;
            color: #0a6b0a;
        }

        .food-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn-small {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            font-size: 0.85em;
            background: #667eea;
        }

        .btn-small:hover {
            background: #764ba2;
        }

        .btn-danger {
            background: #ff6b6b;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .btn-success {
            background: #51cf66;
        }

        .btn-success:hover {
            background: #40c057;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .favorite-card {
            background: #f9f9f9;
            border: 2px solid #fffacd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .favorite-card:hover {
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.2);
            transform: translateY(-2px);
        }

        .favorite-card-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .favorite-card-count {
            font-size: 0.9em;
            color: #ff8c00;
        }

        .success-message {
            background: #e0ffe0;
            color: #0a6b0a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👶 Baby Food Tracker</h1>
            <p>Track meals, allergies, and favorites</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('add')">➕ Add Food</button>
            <button class="tab-btn" onclick="switchTab('view')">📋 View History</button>
            <button class="tab-btn" onclick="switchTab('favorites')">⭐ Favorites</button>
            <button class="tab-btn" onclick="switchTab('allergies')">⚠️ Allergies</button>
        </div>

        <!-- Add Food Tab -->
        <div id="add" class="tab-content active">
            <div class="success-message" id="successMsg">✓ Food added successfully!</div>
            
            <div class="form-group">
                <label for="foodName">Food Name</label>
                <input type="text" id="foodName" placeholder="e.g., Banana puree" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="foodTime">Time Fed</label>
                <input type="datetime-local" id="foodTime">
            </div>

            <div class="form-group">
                <label>Portion Size</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="portionAmount" placeholder="Amount" style="flex: 1;" min="0" step="0.1">
                    <select id="portionUnit" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em;">
                        <option value="ml">ml</option>
                        <option value="oz">oz</option>
                        <option value="grams">grams</option>
                        <option value="tbsp">tbsp</option>
                        <option value="tsp">tsp</option>
                        <option value="cups">cups</option>
                        <option value="pieces">pieces</option>
                    </select>
                </div>
            </div>

            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="isAllergen">
                    <label for="isAllergen" style="margin-bottom: 0;">Mark as Allergen</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="isFavorite">
                    <label for="isFavorite" style="margin-bottom: 0;">Save as Favorite</label>
                </div>
            </div>

            <button onclick="addFood()">Add Food Entry</button>
        </div>

        <!-- View History Tab -->
        <div id="view" class="tab-content">
            <div id="historyList"></div>
        </div>

        <!-- Favorites Tab -->
        <div id="favorites" class="tab-content">
            <div id="favoritesList"></div>
        </div>

        <!-- Allergies Tab -->
        <div id="allergies" class="tab-content">
            <div id="allergiesList"></div>
        </div>
    </div>

    <script>
        // Initialize time input with current time
        function setCurrentDateTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('foodTime').value = now.toISOString().slice(0, 16);
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'view') renderHistory();
            if (tabName === 'favorites') renderFavorites();
            if (tabName === 'allergies') renderAllergies();
        }

        // Get data from localStorage
        function getData() {
            return JSON.parse(localStorage.getItem('babyFoodData')) || [];
        }

        // Save data to localStorage
        function saveData(data) {
            localStorage.setItem('babyFoodData', JSON.stringify(data));
        }

        // Add food
        function addFood() {
            const name = document.getElementById('foodName').value.trim();
            const time = document.getElementById('foodTime').value;
            const portionAmount = document.getElementById('portionAmount').value;
            const portionUnit = document.getElementById('portionUnit').value;
            const isAllergen = document.getElementById('isAllergen').checked;
            const isFavorite = document.getElementById('isFavorite').checked;

            if (!name || !time) {
                alert('Please fill in all required fields');
                return;
            }

            const data = getData();
            data.push({
                id: Date.now(),
                name,
                timestamp: new Date(time).toISOString(),
                portion: portionAmount ? `${portionAmount} ${portionUnit}` : 'Not specified',
                isAllergen,
                isFavorite,
                markedAsFed: true
            });

            saveData(data);
            showSuccessMessage();
            document.getElementById('foodName').value = '';
            document.getElementById('portionAmount').value = '';
            setCurrentDateTime();
            document.getElementById('isAllergen').checked = false;
            document.getElementById('isFavorite').checked = false;
        }

        // Show success message
        function showSuccessMessage() {
            const msg = document.getElementById('successMsg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        // Format time
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Render history
        function renderHistory() {
            const data = getData();
            const history = document.getElementById('historyList');

            if (data.length === 0) {
                history.innerHTML = '<div class="empty-state"><p>No food entries yet</p><p>Add your first food entry to get started!</p></div>';
                return;
            }

            history.innerHTML = data
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
                .map(item => `
                    <div class="food-item">
                        <div class="food-name">${item.name}</div>
                        <div class="food-meta">
                            <div class="meta-item timestamp">⏰ ${formatTime(item.timestamp)}</div>
                            <div class="meta-item">📊 ${item.portion}</div>
                            ${item.markedAsFed ? '<div class="meta-item"><span class="badge badge-fed">✓ Fed</span></div>' : ''}
                            ${item.isAllergen ? '<div class="meta-item"><span class="badge badge-allergen">⚠️ Allergen</span></div>' : ''}
                            ${item.isFavorite ? '<div class="meta-item"><span class="badge badge-favorite">⭐ Favorite</span></div>' : ''}
                        </div>
                        <div class="food-actions">
                            <button class="btn-small btn-danger" onclick="deleteFood(${item.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
        }

        // Render favorites
        function renderFavorites() {
            const data = getData();
            const favorites = data.filter(item => item.isFavorite);
            const container = document.getElementById('favoritesList');

            if (favorites.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No favorite foods yet</p><p>Mark foods as favorites when adding them!</p></div>';
                return;
            }

            const grouped = favorites.reduce((acc, item) => {
                if (!acc[item.name]) {
                    acc[item.name] = { count: 0, lastPortion: item.portion };
                }
                acc[item.name].count += 1;
                acc[item.name].lastPortion = item.portion;
                return acc;
            }, {});

            container.innerHTML = `
                <div class="favorites-grid">
                    ${Object.entries(grouped).map(([name, data]) => `
                        <div class="favorite-card" onclick="addFavoriteQuickly('${name.replace(/'/g, "\\'")}', '${data.lastPortion.replace(/'/g, "\\'")}')">
                            <div class="favorite-card-name">${name}</div>
                            <div class="favorite-card-count">Fed ${data.count}x</div>
                            <div style="font-size: 0.85em; color: #666; margin-bottom: 8px;">Last: ${data.lastPortion}</div>
                            <button class="btn-small" style="margin-top: 10px;">Add Now</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Add favorite quickly
        function addFavoriteQuickly(name, portion) {
            const data = getData();
            data.push({
                id: Date.now(),
                name,
                timestamp: new Date().toISOString(),
                portion: portion || 'Not specified',
                isAllergen: false,
                isFavorite: true,
                markedAsFed: true
            });

            saveData(data);
            showSuccessMessage();
        }

        // Render allergies
        function renderAllergies() {
            const data = getData();
            const allergens = data.filter(item => item.isAllergen);
            const container = document.getElementById('allergiesList');

            if (allergens.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No allergens marked yet</p><p>Mark foods as allergens to track them here!</p></div>';
                return;
            }

            const grouped = allergens.reduce((acc, item) => {
                if (!acc[item.name]) {
                    acc[item.name] = [];
                }
                acc[item.name].push(item);
                return acc;
            }, {});

            container.innerHTML = Object.entries(grouped).map(([name, items]) => `
                <div class="food-item" style="border-left-color: #ff6b6b;">
                    <div class="food-name">⚠️ ${name}</div>
                    <div class="food-meta">
                        <div class="meta-item">Last given: ${formatTime(items[items.length - 1].timestamp)}</div>
                        <div class="meta-item">Last portion: ${items[items.length - 1].portion}</div>
                        <div class="meta-item">Times given: ${items.length}</div>
                    </div>
                </div>
            `).join('');
        }

        // Delete food
        function deleteFood(id) {
            if (confirm('Delete this entry?')) {
                let data = getData();
                data = data.filter(item => item.id !== id);
                saveData(data);
                renderHistory();
            }
        }

        // Initialize on load
        window.addEventListener('load', () => {
            setCurrentDateTime();
        });
    </script>
</body>
</html>
